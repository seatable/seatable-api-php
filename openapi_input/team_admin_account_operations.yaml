      tags:
        - Customizing
      summary: Update Team Logo
      operationId: updateTeamLogo
      description: Replace the current team logo by uploading a new one.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/upload_file"

openapi: 3.0.0
info:
  title: Account Operations - Team admin
  description: >-
    The official SeaTable API Reference (OpenAPI 3.0).
  version: "6.1"
servers:
  - url: "https://{server}"
    variables:
      server:
        default: cloud.seatable.io

x-readme:
  explorer-enabled: true
  metrics-enabled: false
  proxy-enabled: false

# the error messages, if query params are missing, are strange and misleading.

tags:
  - name: Users
    description: Manage users
  - name: Bases
    description: Manage bases
  - name: Groups
    description: Manage groups
  - name: Sharing Links
    description: Manage sharing links
  - name: Info & Settings
    description: Retrieve team info and update team settings
  - name: Activities & Logs
    description: Retrieve team activities and logs
  - name: Statistics
    description: Retrieve statistics about system activities
  - name: Customizing
    description: Customize team appearance
  - name: SAML
    description: Manage SAML settings

components:
  securitySchemes:
    AccountTokenAuth:
      type: http
      scheme: bearer
      description: This is the [Account-Token](/reference/authentication).

  parameters:
    #=======================Query parameters=======================#
    page:
      name: page
      description: The page number you want to start showing the entries. If no value is provided, 1 will be used.
      in: query
      schema:
        type: integer
        minimum: 1
      example: 1
      required: false
    per_page:
      name: per_page
      in: query
      schema:
        type: integer
        minimum: 1
      description: The number of results that should be returned. If no value is provided, 25 results will be returned.
      example: 25
      required: false
    query_base_name:
      name: query
      in: query
      schema:
        type: string
      description: Exact name or a part of the name of the base, case insensitive.
      example: "Example"
    dtable_uuid:
      name: dtable_uuid
      in: query
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$'
      description: The unique identifier of a base.
      example: 5c264e76-0e5a-448a-9f34-580b551364ca
    ignore_asset:
      name: ignore_asset
      in: query
      schema:
        type: boolean
      example: false
      description: Set this to `true` to export the base without assets. Default is `false`.
    login_status:
      name: status
      in: query
      schema:
        type: string
        enum: [success, failure]
      example: success
      description: Set this to `success` to only return successful logins. By default, all logins are returned.
    start:
      name: start
      in: query
      schema:
        type: string
        format: date-time
      description: Start date in ISO format.
      example: "2025-11-01T06:00:00+01:00"
      required: false
    end:
      name: end
      in: query
      schema:
        type: string
        format: date-time
      description: End date in ISO format.
      example: "2025-11-30T18:00:00+01:00"
      required: false
    operation_group:
      name: operation_group
      in: query
      schema:
        type: string
        enum: [user, group, base]
      example: user
      description: Filter by a specific operation group. By default, all operations are returned.
      required: false
    group_by:
      name: group_by
      in: query
      schema:
        type: string
        enum: [owner, dtable_uuid]
      required: true
      description: Query by owner or Base
      example: "owner"
    date:
      name: date
      in: query
      schema:
        type: string
      required: true
      description: A date string in YYYY-MM-DD format
      example: "2025-01-01"

    #=======================Path parameters=======================#
    org_id:
      name: org_id
      in: path
      schema:
        type: integer
        minimum: 1
      required: true
      description: >-
        The ID of your team/organization. Numeric. Get it from [Get Team](/reference/getteaminfo). Contact your team admin, if you
        are not the admin.
      example: 1
    base_id:
      name: base_id
      in: path
      schema:
        type: string
      required: true
      description: The ID of the base. Don't mix this up with the base_uuid!
      example: "000"
    base_uuid:
      name: base_uuid
      in: path
      schema:
        type: string
        pattern: '^[0-9a-fA-F]{8}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{4}\b-[0-9a-fA-F]{12}$'
      required: true
      description: The unique identifier of a base. Sometimes also called dtable_uuid.
      example: 5c264e76-0e5a-448a-9f34-580b551364ca
    external_link_token:
      name: external_link_token
      in: path
      schema:
        type: string
      required: true
      example: "d6d006b319ca4d2aa060"
    view_external_link_token:
      name: view_external_link_token
      in: path
      schema:
        type: string
      required: true
      example: "d6d006b319ca4d2aa060"
    invite_link_token:
      name: invite_link_token
      in: path
      schema:
        type: string
        pattern: "^[0-9a-f]{20}$"
      required: true
      example: "0366b8995d7f47d8eu3t"
    group_id:
      name: group_id
      in: path
      schema:
        type: integer
        minimum: 1
      required: true
      description: >-
        The ID of the group to query. Can be retrieved from the call [List Groups in Your Team](/reference/listgroups-1).
      example: "1"
    user_id:
      name: user_id
      description: The unique `user_id` in the form ...@auth.local. This is not the email address of the user.
      in: path
      schema:
        type: string
        pattern: "^[a-f0-9]{32}(@auth.local)$"
      required: true
      example: 123456789f1e4c8d8e1c31415867317c@auth.local
    app_name:
      name: app_name
      description: The name of your app. Every API-Token has a name to identify the purpose. The name of the app must be unique for every base.
      in: path
      schema:
        type: string
      required: true
      example: "My App"

  schemas:
    team_admin_permission:
      type: string
      enum: ["", "r", "rw"]
    team_admin_password:
      type: string
      description: User's password to login.
      example: "pw12345678"
    team_admin_expire_days:
      type: integer
      example: 20
    team_admin_group_name:
      type: string
      description: The name of the group.
      example: "Sample Group"
      required:
        - group_name
    team_admin_group_owner:
      type: string
      description: >-
        The `user_id` of the owner of the group. Optional. If left
        blank, the newly added group will not be visible to anyone
        but still operatable.
      example: "123abc456def789ghi123jkl456mno789@auth.local"
    team_admin_user_id:
      type: string
      description: The unique `user_id` in the form ...@auth.local. This is not the email address of the user.
      example: "123abc456def789ghi123jkl456mno789@auth.local"
    team_admin_email:
      type: string
      description: User's contact email to login.
      example: mai@example.com
    team_admin_name:
      type: string
      description: User's full name.
      example: Mai Thai
    team_admin_contact_email:
      type: string
      description: User's contact email.
      example: mai@example.com
    team_admin_is_active:
      type: boolean
      description: Determines the current status of this account. An inactive account can not login anymore.
    team_admin_is_staff:
      type: boolean
      description: Determines if the user account has access to the system administration area.
    team_admin_with_workspace:
      type: boolean
      description: >-
        If a workspace should be automatically created for the user.
        Optional. `false` by default.
      example: true
    team_admin_id_in_org:
      type: string
      description: >-
        The team ID of the user, could be a student's ID or employee
        ID. String.
      example: Student001
    team_admin_quota_total:
      type: integer
      description: Update their total quota in MB.
      example: "3"
    team_admin_group_id:
      type: string
      description: The ID of the group you'd like to move.
      example: "1"
    anchor_group_id:
      type: string
      description: >-
        The ID of the group where you'd like your group to be moved
        under.
      example: "1"
    to_last:
      type: boolean
      description: >-
        Whether you'd like to move your group to the bottom of the
        list (`true`). `false` by default.
      example: true
    enable_force_2fa:
      type: boolean
      description: >-
        if the 2-factor-authentication is forced (`true` or
        `false`).
      example: true
    enable_force_sso_login:
      type: boolean
      description: Whether login via SSO is enforced for all team members (`true` or `false`).
      example: true
    enable_new_user_email:
      type: boolean
      description: >-
        if newly added users will get a system email (`true` or
        `false`).
      example: true
    enable_external_user_access_invite_link:
      type: boolean
      description: >-
        if external users can access bases via invite links (`true`
        or `false`).
      example: false
    enable_member_modify_name:
      type: boolean
      description: >-
        if members are allowed to change their names (`true` or
        `false`).
      example: false
    upload_file:
      type: object
      properties:
        file:
          type: string
          description: >-
            The image you'd like to upload from your local drive. Only .jpg, .jpeg, .gif or .png are allowed.
          format: binary
    new_org_name:
      type: string
      description: The new name of your team.
      example: SeaTable GmbH
    metadata_url:
      type: string
      description: "URL pointing to the metadata of your Identity Provider (IdP)."
      example: "https://<URL-of-your-idp>/metadata.yml"
    domain:
      type: string
      description: "Domain that should be connected to your SeaTable Team. Only email addresses with this domain will be redirected to your Identity Provider (IdP)."
      example: "example.com"
    idp_certificate:
      type: string
      description: "Provide the certificate from your IdP for this service."
      example: "-----BEGIN CERTIFICATE-----xxxxxxxxxxxxxxxxxxxx-----END CERTIFICATE-----"

paths:
  # Users
  /api/v2.1/org/{org_id}/admin/users/:
    get:
      tags:
        - Users
      summary: List Users (Team)
      operationId: listTeamUsers
      description: List all the users in the organization, or only the admins/non-admins.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - $ref: "#/components/parameters/org_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                user_list:
                  - email: 1234567a6569491ba42905bf1647fd3f@auth.local
                    name: Jasmin Tee
                    contact_email: jasmin@example.com
                    quota_usage: 0
                    quota_total: -2
                    id_in_org: ""
                    last_login: "2021-03-02T12:58:29+00:00"
                    id: 123
                    is_active: true
                    ctime: "2020-11-18T12:30:31+00:00"
                    self_usage: 0
                    quota: -2
                    is_org_admin: true
    post:
      tags:
        - Users
      summary: Add User
      operationId: addUser
      description: >-
        Add a new user in the team (organization).


        In the request body, define the new user's `email`, `name` and
        `password`. 


        SeaTable does not automatically create a workspace for a newly added
        user: the `with_workspace` parameter is `false` by default. If you would
        like your new user to have a workspace when they are added (so that they
        can start operating workspaces and bases right away with API requests),
        make sure you set `true` for this parameter.


        Otherwise, their workspace will only be created when they login to the
        SeaTable web interface for the first time.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                email:
                  $ref: "#/components/schemas/team_admin_email"
                name:
                  $ref: "#/components/schemas/team_admin_name"
                password:
                  $ref: "#/components/schemas/team_admin_password"
                with_workspace:
                  $ref: "#/components/schemas/team_admin_with_workspace"
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                id: 125
                is_active: true
                ctime: "2021-03-02T13:02:46+00:00"
                name: Mai Thai
                email: 12345671bc384ab2b7adbec984948390@auth.local
                contact_email: mai@example.com
                last_login: null
                self_usage: 0
                quota: -2
                workspace_id: 999

  /api/v2.1/org/{org_id}/admin/users/{user_id}/:
    get:
      tags:
        - Users
      summary: Get User
      operationId: getUser
      description: Get a user's details.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                email: "6196ab3dacef4e539ae8da4844b58a1f@auth.local"
                name: "John Doe"
                contact_email: "john.doe@example.org"
                quota_usage: 0
                quota_total: -2
                avatar_url: "https://cloud.seatable.io/media/avatars/a/a/f01c6071928d63fd2837312e64d915/resized/256/70017f2bc5e0c9eeda31e8e401e2cbef.png"
                id_in_org: ""
                has_default_device: false
                is_force_2fa: true
                is_active: true
                is_org_admin: false
    put:
      tags:
        - Users
      summary: Update User
      operationId: updateUser
      description: >-
        Update a user's details. See the parameter list for the detailed
        description of each entry.
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  $ref: "#/components/schemas/team_admin_name"
                contact_email:
                  $ref: "#/components/schemas/team_admin_contact_email"
                is_staff:
                  $ref: "#/components/schemas/team_admin_is_staff"
                is_active:
                  $ref: "#/components/schemas/team_admin_is_active"
                quota_total:
                  $ref: "#/components/schemas/team_admin_quota_total"
                id_in_org:
                  $ref: "#/components/schemas/team_admin_id_in_org"
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                email: 23456789d1754bb4afa2c2cb7369d244@auth.local
                name: Stefan
                contact_email: test999@fun-mail.net
                quota_usage: 144328135
                quota_total: 3000000
                is_active: true
                id: 253
                ctime: "2020-11-18T12:43:22+00:00"
                id_in_org: Student001
                last_login: "2022-03-26T15:38:18+00:00"
                self_usage: 144328135
                quota: 3000000
    delete:
      tags:
        - Users
      summary: Delete User
      operationId: deleteUser
      description: >-
        Delete a user by their `user_id` permanently. When you delete a user,
        their bases are automatically moved into the organization's trash bin.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
  /api/v2.1/org/{org_id}/admin/users/{user_id}/set-password/:
    put:
      tags:
        - Users
      summary: Reset User Password
      operationId: resetUserPassword
      description: >-
        Reset the password of a user and get a new password. The new password
        will be automatically sent to the user per email.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                new_password: 4nhCOEU3fl
  /api/v2.1/org/{org_id}/admin/users/{user_id}/two-factor-auth/:
    put:
      tags:
        - Users
      summary: Enforce 2FA
      operationId: enforceTwofactor
      description: >-
        As the team administrator, you can force each team member to use
        2-factor authentication (2FA).


        When the value of `force_2fa` is `true` in this request, the member will be
        requested to activate 2FA by scanning a QR code next time they log in.
        To cancel enforcing them to use 2FA, change the value to `false` and send
        this request again.


        This request is to be distinguished from the next request, because
        cancelling the enforcement doesn't necesssarily [Disable 2FA for A User
        in Team](/reference/disabletwofactor-1), which serves a different purpose.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                force_2fa:
                  type: boolean
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
    delete:
      tags:
        - Users
      summary: Disable 2FA
      operationId: disableTwoFactor
      description: >-
        If a user in your team has lost their phone or deleted the authenticator
        App by accident, they cannot log in to SeaTable anymore if 2FA is
        enabled for them. In this case, you as the team administrator can
        disable 2FA for them.

        Again, this is to be distinguished from the request [Enforce 2FA for A
        User in Team](/reference/enforcetwofactor-1) when you use `force_2fa = false`, which only cancels the
        enforcement of 2FA but doesn't necessarily disable it for them.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true

  # Bases
  /api/v2.1/org/{org_id}/admin/dtables/:
    get:
      tags:
        - Bases
      summary: List Bases (Team)
      operationId: listBases
      description: >-
        List all the bases in the current organization.


        The returned `id` value is the ID of the base, to be distinguished from
        the base's `base_uuid`. Details see the **SeaTable API Parameter
        Reference**.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
        - $ref: "#/components/parameters/org_id"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                dtable_list:
                  - id: 158
                    workspace_id: 304
                    uuid: 12345678-7e27-46a8-8b18-6cc6f3db2057
                    name: Test base
                    created_at: "2020-11-18T12:31:29+00:00"
                    updated_at: "2021-03-02T10:29:03+00:00"
                    color: null
                    text_color: null
                    icon: null,
                    is_encrypted: false,
                    in_storage: true,
                    org_id: 1,
                    email: c882391bfa0144c4af64e4e0cde50b6c@auth.local,
                    group_id: -1,
                    owner: Jasmin Tee,
                    owner_deleted: false,
                    rows_count: 2
                  - id: 159
                    workspace_id: 304
                    uuid: 87654321-d895-402f-9718-a85f26c65d99
                    name: Project Tracker
                    created_at: "2020-11-18T12:31:29+00:00"
                    updated_at: "2021-03-02T10:29:03+00:00"
                    color: null
                    text_color: null
                    icon: null,
                    is_encrypted: false,
                    in_storage: true,
                    org_id: 1,
                    email: c882391bfa0144c4af64e4e0cde50b6c@auth.local,
                    group_id: -1,
                    owner: TeamAdmin,
                    owner_deleted: false,
                    rows_count: 20
                count: 16
  /api/v2.1/org/{org_id}/admin/users/{user_id}/dtables/:
    get:
      tags:
        - Bases
      summary: List User's Bases
      operationId: listUsersBases
      description: List all the bases of a certain user by the user's ID.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/user_id"
        - $ref: "#/components/parameters/page"
        - $ref: "#/components/parameters/per_page"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                dtable_list:
                  - id: 6
                    workspace_id: 2
                    uuid: 3c899a81-6a0c-4111-bb19-288ebf8442fd
                    name: CRM
                    created_at: '2025-11-28T14:16:30+01:00'
                    updated_at: '2025-11-28T14:17:04+01:00'
                    color: "#E91E63"
                    text_color: null
                    icon: icon-user-interview
                    is_encrypted: false
                    in_storage: true
                    org_id: 2
                    email: e38487b4357e40c8b1359223ba87a1af@auth.local
                    group_id: -1
                    owner: org-1-admin
                    owner_deleted: false
                    rows_count: 7
                  - id: 7
                    workspace_id: 2
                    uuid: e97bb668-da36-484c-8ac9-8aa9e0564f4c
                    name: Finances
                    created_at: '2025-11-28T14:18:31+01:00'
                    updated_at: '2025-11-28T14:18:31+01:00'
                    color: "#00C9C7"
                    text_color: null
                    icon: icon-dollar
                    is_encrypted: false
                    in_storage: true
                    org_id: 2
                    email: e38487b4357e40c8b1359223ba87a1af@auth.local
                    group_id: -1
                    owner: org-1-admin
                    owner_deleted: false
                    rows_count: 0
                count: 2
  /api/v2.1/org/{org_id}/admin/dtables/{base_uuid}/:
    get:
      tags:
        - Bases
      summary: Get Base
      operationId: getBase
      description: >-
        Get the details of a base in a team
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/base_uuid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                id: 158
                workspace_id: 304
                uuid: 12345678-7e27-46a8-8b18-6cc6f3db2057
                name: Test base
                created_at: "2020-11-18T12:31:29+00:00"
                updated_at: "2021-03-02T10:29:03+00:00"
                color: null
                text_color: null
                icon: null,
                is_encrypted: false,
                in_storage: true,
                org_id: 1,
                owner: JiweRan
                email: c882391bfa0144c4af64e4e0cde50b6c@auth.local,
                group_id: -1,
                owner_deleted: false,
                rows_count: 2
    delete:
      tags:
        - Bases
      summary: Delete Base
      operationId: deleteBase
      description: >-
        Delete a base. This base will be put into the organization's trash bin,
        and permanently deleted automatically after 30 days.
      security:
        - AccountTokenAuth: []
      parameters:
        - $ref: "#/components/parameters/org_id"
        - $ref: "#/components/parameters/base_uuid"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
  /api/v2.1/org/{org_id}/admin/trash-dtables/:

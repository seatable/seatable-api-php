                  $ref: "#/components/schemas/team_admin_group_id"
                anchor_group_id:
                  $ref: "#/components/schemas/anchor_group_id"
                to_last:
                  $ref: "#/components/schemas/to_last"
      security:
        - AccountTokenAuth: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
              example:
                success: true
